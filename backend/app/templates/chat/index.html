{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="mb-4"><i class="bi bi-chat-dots-fill text-primary"></i> Messages</h2>
        
        <div class="card shadow-sm border-0">
            <div class="list-group list-group-flush">
                {% for user in chat_users %}
                <a href="{{ url_for('chat.chat_with', user_id=user.id) }}" class="list-group-item list-group-item-action p-4 border-0 border-bottom">
                    <div class="d-flex align-items-center">
                        <i class="bi bi-person-circle fs-2 me-3 text-muted"></i>
                        <div class="flex-grow-1">
                            <h5 class="mb-1 fw-bold">{{ user.name }}</h5>
                            <span class="badge bg-light text-dark border">{{ user.role|capitalize }}</span>
                        </div>
                        <i class="bi bi-chevron-right text-muted"></i>
                    </div>
                </a>
                {% else %}
                <div class="text-center py-5">
                    <i class="bi bi-chat-left-dots display-1 text-muted"></i>
                    <p class="mt-3 lead text-muted">No conversations yet.</p>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
