{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="mb-3">Report an Issue</h3>

        <form id="reportForm" method="POST" enctype="multipart/form-data">

          <div class="mb-3">
            <label class="form-label">Your Name</label>
            <input name="name" id="name" class="form-control" value="{{ session.get('user_name') }}" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Location</label>
            <input name="location" id="location" class="form-control" required placeholder="MG Road, Indore">
          </div>

          <div class="mb-3">
            <label class="form-label">Attach Image (Optional)</label>
            <input type="file" id="attachment" name="attachment" accept="image/*" class="form-control">
          </div>

          <!-- AI Section -->
          <div id="aiArea" style="display:none;">
            <button type="button" id="analyzeBtn" class="btn btn-outline-primary w-100">
              🤖 Analyze Image with AI
            </button>
            <div id="aiStatus" class="mt-2"></div>
          </div>

          <div class="mb-3 mt-3">
            <label class="form-label">Issue Description</label>
            <textarea id="issue" name="issue" class="form-control" rows="5" required></textarea>
          </div>

          <button type="submit" class="btn btn-success w-100">Submit Issue</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
const fileInput = document.getElementById("attachment");
const aiArea = document.getElementById("aiArea");
const analyzeBtn = document.getElementById("analyzeBtn");
const aiStatus = document.getElementById("aiStatus");
const issueTextarea = document.getElementById("issue");

// Show AI section when image selected
fileInput.addEventListener("change", () => {
  aiArea.style.display = fileInput.files.length ? "block" : "none";
});

// AI Analyze Button
if (analyzeBtn) {
  analyzeBtn.addEventListener("click", async function () {
    if (!fileInput.files.length) return;

    analyzeBtn.disabled = true;
    analyzeBtn.innerText = "Analyzing...";

    const form = new FormData();
    form.append("image", fileInput.files[0]);
    form.append("location", document.getElementById("location").value);

    try {
      const response = await fetch("/analyze-image", { method: "POST", body: form });
      const data = await response.json();

      if (data.description) {
        issueTextarea.value = data.description;
        aiStatus.innerHTML = `<span class="text-success fw-bold">AI Analysis Complete</span><br>
            Category: ${data.category}<br>
            Severity: ${data.severity}<br>
            Confidence: ${Math.round(data.confidence)}%`;
      } else {
        aiStatus.innerHTML = `<span class="text-danger">${data.error}</span>`;
      }
      analyzeBtn.innerText = "Done";

    } catch (e) {
      aiStatus.innerHTML = `<span class="text-danger">Server error: ${e.message}</span>`;
      analyzeBtn.disabled = false;
      analyzeBtn.innerText = "Analyze Again";
    }
  });
}
</script>
{% endblock %}
