{% extends "base.html" %}
{% block content %}

<div class="container mt-4">

  <h2 class="fw-bold mb-4">Admin Dashboard</h2>

  <!-- TOP STATS -->
  <div class="row g-3 mb-4">

    <div class="col-md-3">
      <div class="card shadow-sm border-0 h-100">
        <div class="card-body">
          <h6 class="text-muted mb-1">Total Issues</h6>
          <h3 class="fw-bold">{{ total_issues }}</h3>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card shadow-sm border-0 h-100">
        <div class="card-body">
          <h6 class="text-muted mb-1">Pending</h6>
          <h3 class="fw-bold">{{ pending_count }}</h3>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card shadow-sm border-0 h-100">
        <div class="card-body">
          <h6 class="text-muted mb-1">Resolved</h6>
          <h3 class="fw-bold">{{ resolved_count }}</h3>
        </div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card shadow-sm border-0 h-100">
        <div class="card-body">
          <h6 class="text-muted mb-1">Critical Severity</h6>
          <h3 class="fw-bold">{{ critical_count }}</h3>
        </div>
      </div>
    </div>

  </div>


  <!-- CHARTS -->
  <div class="row g-4">

    <!-- STATUS CHART -->
    <div class="col-md-6">
      <div class="card shadow-sm border-0 h-100">
        <div class="card-body">
          <h5 class="mb-3 fw-semibold">Issues by Status</h5>
          <canvas id="statusChart" style="height: 300px;"></canvas>
        </div>
      </div>
    </div>

    <!-- CATEGORY CHART -->
    <div class="col-md-6">
      <div class="card shadow-sm border-0 h-100">
        <div class="card-body">
          <h5 class="mb-3 fw-semibold">Issues by Category</h5>
          <canvas id="categoryChart" style="height: 300px;"></canvas>
        </div>
      </div>
    </div>

    <!-- DAILY CHART -->
    <div class="col-12">
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <h5 class="mb-3 fw-semibold">Issues Per Day</h5>
          <canvas id="dailyChart" style="height: 300px;"></canvas>
        </div>
      </div>
    </div>

  </div>

</div>


<!-- CHART.JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const statusLabels = {{ status_labels | tojson }};
  const statusValues = {{ status_values | tojson }};
  const categoryLabels = {{ category_labels | tojson }};
  const categoryValues = {{ category_values | tojson }};
  const dailyLabels = {{ daily_labels | tojson }};
  const dailyValues = {{ daily_values | tojson }};

  // -------------------------
  // STATUS CHART
  // -------------------------
  new Chart(document.getElementById("statusChart"), {
    type: "doughnut",
    data: {
      labels: statusLabels,
      datasets: [{
        data: statusValues
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false
    }
  });


  // -------------------------
  // CATEGORY CHART
  // -------------------------
  new Chart(document.getElementById("categoryChart"), {
    type: "bar",
    data: {
      labels: categoryLabels,
      datasets: [{
        data: categoryValues
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      indexAxis: "y",
      scales: {
        x: {
          beginAtZero: true
        }
      }
    }
  });


  // -------------------------
  // DAILY CHART
  // -------------------------
  new Chart(document.getElementById("dailyChart"), {
    type: "line",
    data: {
      labels: dailyLabels,
      datasets: [{
        data: dailyValues,
        fill: false,
        borderWidth: 2,
        tension: 0.25
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { beginAtZero: true }
      }
    }
  });

});
</script>

{% endblock %}
