{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-7 col-lg-5">

    <div class="card shadow-sm border-0 rounded-4">
      <div class="card-body p-4">

        <h3 class="text-center fw-bold text-primary mb-3">
          Create Your Account
        </h3>
        <p class="text-center text-muted mb-4">
          Register using your email & password.
        </p>

        <form method="POST">

          <!-- Full Name -->
          <div class="mb-3">
            <label class="form-label fw-semibold">
              <i class="bi bi-person-fill"></i> Full Name
            </label>
            <input 
              name="name" 
              type="text" 
              class="form-control p-3" 
              placeholder="Enter full name" 
              required>
          </div>

          <!-- Email -->
          <div class="mb-3">
            <label class="form-label fw-semibold">
              <i class="bi bi-envelope-fill"></i> Email Address
            </label>
            <input 
              name="email" 
              type="email" 
              class="form-control p-3" 
              placeholder="you@example.com" 
              required>
          </div>

          <!-- Password -->
          <div class="mb-3">
            <label class="form-label fw-semibold">
              <i class="bi bi-lock-fill"></i> Password
            </label>
            <input 
              name="password" 
              type="password" 
              class="form-control p-3" 
              placeholder="Enter password"
              required>
          </div>

          <!-- Submit Button -->
          <button class="btn btn-primary w-100 py-2 fw-semibold rounded-3">
            Create Account
          </button>

        </form>

      </div>
    </div>

    <p class="text-center mt-4">
      Already have an account?
      <a href="{{ url_for('auth.login') }}" class="fw-bold text-primary">
        Login here
      </a>
    </p>

  </div>
</div>

{% endblock %}
