{% extends "base.html" %}
{% block content %}
<div class="text-center">
    <h1 class="mb-4">Welcome to the Civic Issue Tracker</h1>
    <p class="lead text-muted mb-5">
        Report civic issues like potholes, garbage, or streetlight failures and help improve your city.
    </p>

    <a href="{{ url_for('report_issue') }}" class="btn btn-primary btn-lg mx-2">Report an Issue</a>
    <a href="{{ url_for('view_issues') }}" class="btn btn-outline-secondary btn-lg mx-2">View Reported Issues</a>
</div>
{% endblock %}
