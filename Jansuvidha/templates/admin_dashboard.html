<!-- templates/admin_dashboard.html -->
{% extends "base.html" %}
{% block content %}
<h3>Admin Dashboard</h3>

<!-- list of issues with quick controls -->
<table class="table table-striped">
  <thead><tr><th>ID</th><th>Reporter</th><th>Location</th><th>Category</th><th>Status</th><th>Assigned</th><th>Action</th></tr></thead>
  <tbody>
    {% for it in issues %}
    <tr>
      <td>{{ it.id }}</td>
      <td>{{ it.name }}</td>
      <td>{{ it.location }}</td>
      <td>{{ it.category or '-' }}</td>
      <td>{{ it.status }}</td>
      <td>{{ it.assigned_to or '-' }}</td>
      <td>
        <form method="post" action="{{ url_for('update_status', issue_id=it.id) }}" class="d-inline">
          <select name="status" class="form-select form-select-sm d-inline w-auto">
            <option{{ ' selected' if it.status=='Pending' }}>Pending</option>
            <option{{ ' selected' if it.status=='In Progress' }}>In Progress</option>
            <option{{ ' selected' if it.status=='Resolved' }}>Resolved</option>
          </select>
          <button class="btn btn-sm btn-primary ms-1">Update</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
