{% extends "base.html" %}
{% block content %}
<h2 class="text-center mb-4">Reported Issues</h2>
<div class="table-responsive">
  <table class="table table-hover align-middle">
    <thead class="table-primary">
      <tr>
        <th>Name</th>
        <th>Issue</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      {% for issue in issues %}
      <tr>
        <td>{{ issue.name }}</td>
        <td>{{ issue.issue }}</td>
        <td><span class="badge bg-secondary">{{ issue.status }}</span></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
