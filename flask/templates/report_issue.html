{% extends "base.html" %}
{% block content %}
<div class="col-md-8 mx-auto">
  <h2 class="mb-4 text-center">Report an Issue</h2>
  <form method="POST" class="shadow p-4 rounded bg-light">
    <div class="mb-3">
      <label class="form-label">Your Name</label>
      <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Describe the Issue</label>
      <textarea name="issue" class="form-control" rows="3" placeholder="E.g. Pothole near City Mall" required></textarea>
    </div>
    <div class="mb-3">
      <label class="form-label">Location</label>
      <input type="text" name="location" class="form-control" placeholder="E.g. MG Road, Indore" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Submit Issue</button>
  </form>
</div>
{% endblock %}
