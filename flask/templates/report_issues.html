{% extends "base.html" %}
{% block content %}
<h2 class="text-center mb-4">Report an Issue</h2>

<form method="POST" class="card p-4 shadow-sm mx-auto" style="max-width: 600px;">
    <div class="mb-3">
        <label class="form-label">Your Name</label>
        <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Describe the Issue</label>
        <textarea id="issue" name="issue" class="form-control" rows="3" placeholder="E.g. Pothole near City Mall" required></textarea>
        <button type="button" class="btn btn-secondary mt-2" onclick="checkGrammar()">Check Grammar</button>
        <div id="corrected" class="mt-2 text-success fw-bold"></div>
    </div>

    <div class="mb-3">
        <label class="form-label">Location</label>
        <input type="text" name="location" class="form-control" placeholder="E.g. MG Road, Indore" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Attach File</label>
        <input type="file" id="attachment" name="attachment" class="form-control" accept="image/*,video/*,.pdf,.doc,.docx">
        <small class="text-muted">You can upload a photo, short video, or document (max 10MB).</small>
        <div id="preview" class="mt-3"></div>
    </div>


    <button type="submit" class="btn btn-primary w-100">Submit Issue</button>
</form>

<script>
async function checkGrammar() {
    const text = document.getElementById("issue").value;
    try {
        const response = await fetch("/correct", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text })
        });
        const data = await response.json();
        document.getElementById("corrected").innerText = "Corrected: " + data.corrected_text;
        document.getElementById("issue").value = data.corrected_text; // auto-fills corrected text
    } catch (err) {
        document.getElementById("corrected").innerText = "Error: " + err.message;
    }
}
</script>

{% endblock %}
