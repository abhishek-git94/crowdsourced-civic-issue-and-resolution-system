<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LanguageTool Text Correction</title>
</head>
<body>
    <a href="{{ url_for('report_issue') }}">Report a Civic Issue</a>


    <h1>LanguageTool Text Correction</h1>

    <textarea id="text" rows="5" cols="50">This are bad sentence.</textarea><br><br>
    <button onclick="correctText()">Correct Text</button>

    <h3>Corrected Text:</h3>
    <p id="corrected" style="font-weight: bold;"></p>

    <script>
        async function correctText() {
            const text = document.getElementById("text").value;
            try {
                const response = await fetch("/correct", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text })
                });

                if (!response.ok) {
                    throw new Error("Server error: " + response.status);
                }

                const data = await response.json();
                document.getElementById("corrected").innerText = data.corrected_text;
            } catch (err) {
                document.getElementById("corrected").innerText = "Error: " + err.message;
            }
        }
    </script>
</body>
</html>
